<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Música - Apple Music Style</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
        /* ========== RESET Y BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 240px;
            background: #121212;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            border-right: 1px solid #1e1e1e;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            color: #ff2d55;
        }

        .logo i {
            font-size: 28px;
        }

        .logo span {
            color: #ffffff;
        }

        .sidebar nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar nav ul li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #b3b3b3;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar nav ul li:hover {
            color: #ffffff;
            background: #1e1e1e;
        }

        .sidebar nav ul li.active {
            color: #ffffff;
            background: #1e1e1e;
        }

        .sidebar nav ul li i {
            width: 20px;
            text-align: center;
        }

        .sidebar nav ul li .badge {
            background: #ff2d55;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: auto;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
            overflow-y: auto;
            padding-bottom: 90px;
            position: relative;
        }

        /* ========== HEADER ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            gap: 20px;
            font-size: 20px;
            color: #b3b3b3;
            cursor: pointer;
        }

        .header-right i:hover {
            color: #ffffff;
        }

        /* ========== VIEWS ========== */
        .view {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== SONG GRID ========== */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            padding: 24px 32px;
        }

        .song-card {
            background: #181818;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
            position: relative;
        }

        .song-card:hover {
            background: #282828;
            transform: translateY(-4px);
        }

        .song-card .favorite-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ff2d55;
            color: white;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 12px;
            display: none;
            z-index: 5;
        }

        .song-card .favorite-badge.show {
            display: block;
        }

        .song-card-img {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #b3b3b3;
            position: relative;
            margin-bottom: 12px;
            background-size: cover;
            background-position: center;
        }

        .song-card-img .default-icon {
            opacity: 0.5;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .song-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay i {
            font-size: 40px;
            color: #ffffff;
            opacity: 1;
            background: #ff2d55;
            border-radius: 50%;
            padding: 12px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 45, 85, 0.4);
        }

        .song-card-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-card-info p {
            font-size: 14px;
            color: #b3b3b3;
        }

        /* ========== EMPTY STATE ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #b3b3b3;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* ========== NOW PLAYING VIEW (FULL SCREEN) ========== */
        .now-playing-view {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .now-playing-view.active {
            display: flex;
        }

        .now-playing-view .close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 28px;
            color: #b3b3b3;
            cursor: pointer;
            transition: color 0.2s;
            z-index: 10;
        }

        .now-playing-view .close-btn:hover {
            color: #ffffff;
        }

        .now-playing-view .album-art {
            width: 320px;
            height: 320px;
            border-radius: 16px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #1a1a2e;
        }

        .now-playing-view .album-art .default-icon {
            font-size: 80px;
            color: #b3b3b3;
            opacity: 0.3;
        }

        .now-playing-view .song-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .now-playing-view .song-artist {
            font-size: 18px;
            color: #b3b3b3;
            margin-bottom: 32px;
            text-align: center;
        }

        .now-playing-view .controls {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 24px;
        }

        .now-playing-view .controls i {
            font-size: 22px;
            color: #b3b3b3;
            cursor: pointer;
            transition: all 0.2s;
        }

        .now-playing-view .controls i:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        .now-playing-view .controls .active {
            color: #ff2d55;
        }

        .now-playing-view .controls #play-btn-full {
            font-size: 48px;
            color: #ffffff;
            background: #ff2d55;
            border-radius: 50%;
            padding: 16px;
            width: 76px;
            height: 76px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .now-playing-view .controls #play-btn-full:hover {
            transform: scale(1.08);
        }

        .now-playing-view .progress-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .now-playing-view .progress-container .current-time,
        .now-playing-view .progress-container .total-time {
            font-size: 13px;
            color: #b3b3b3;
            min-width: 40px;
            font-variant-numeric: tabular-nums;
        }

        .now-playing-view .progress-container .progress-bar {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #4a4a4a;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .now-playing-view .progress-container .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .now-playing-view .progress-container .progress-bar::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
        }

        .now-playing-view .extra-controls {
            display: flex;
            gap: 32px;
            margin-top: 28px;
        }

        .now-playing-view .extra-controls i {
            font-size: 20px;
            color: #b3b3b3;
            cursor: pointer;
            transition: all 0.2s;
        }

        .now-playing-view .extra-controls i:hover {
            color: #ffffff;
        }

        .now-playing-view .extra-controls i.active {
            color: #ff2d55;
        }

        /* ========== NOW PLAYING BAR ========== */
        .now-playing {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
            z-index: 100;
            cursor: pointer;
            backdrop-filter: blur(10px);
            gap: 16px;
        }

        .now-playing .song-info {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 180px;
            flex: 0 0 25%;
            pointer-events: none;
        }

        .now-playing .song-info .song-actions {
            pointer-events: all;
        }

        .now-playing .song-thumbnail {
            width: 48px;
            height: 48px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #b3b3b3;
            background-size: cover;
            background-position: center;
            background-color: #1a1a2e;
            flex-shrink: 0;
        }

        .now-playing .song-details {
            flex: 1;
            min-width: 0;
        }

        .now-playing .song-details h4 {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing .song-details p {
            font-size: 12px;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-playing .song-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-left: 6px;
        }

        .now-playing .song-actions i {
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .now-playing .song-actions i:hover {
            color: #ffffff;
        }

        .now-playing .song-actions i.liked {
            color: #ff2d55;
        }

        .now-playing .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            flex: 1;
            max-width: 500px;
            pointer-events: none;
        }

        .now-playing .player-controls .controls-top {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 16px;
            color: #b3b3b3;
            pointer-events: all;
        }

        .now-playing .player-controls .controls-top i {
            cursor: pointer;
            transition: all 0.2s;
        }

        .now-playing .player-controls .controls-top i:hover {
            color: #ffffff;
            transform: scale(1.05);
        }

        .now-playing .player-controls .controls-top i.active {
            color: #ff2d55;
        }

        .now-playing .player-controls .controls-top #play-btn {
            font-size: 28px;
            color: #ffffff;
        }

        .now-playing .player-controls .controls-top #play-btn:hover {
            transform: scale(1.08);
        }

        .now-playing .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            pointer-events: all;
        }

        .now-playing .progress-container .current-time,
        .now-playing .progress-container .total-time {
            font-size: 11px;
            color: #b3b3b3;
            min-width: 30px;
            font-variant-numeric: tabular-nums;
        }

        .now-playing .progress-container .progress-bar {
            flex: 1;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: #4a4a4a;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .now-playing .progress-container .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .now-playing .progress-container .progress-bar::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
        }

        .now-playing .volume-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 120px;
            justify-content: flex-end;
            flex: 0 0 15%;
        }

        .now-playing .volume-controls i {
            color: #b3b3b3;
            font-size: 15px;
        }

        .now-playing .volume-controls .volume-bar {
            width: 70px;
            height: 3px;
            -webkit-appearance: none;
            appearance: none;
            background: #4a4a4a;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .now-playing .volume-controls .volume-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .now-playing .volume-controls .volume-bar::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f0f0f;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .song-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                padding: 16px;
                gap: 16px;
            }

            .header {
                padding: 16px;
            }

            .header-left h1 {
                font-size: 20px;
            }

            .now-playing {
                flex-direction: column;
                height: auto;
                padding: 12px 16px;
                gap: 8px;
            }

            .now-playing .song-info {
                min-width: unset;
                width: 100%;
                flex: none;
            }

            .now-playing .player-controls {
                width: 100%;
                max-width: 100%;
            }

            .now-playing .volume-controls {
                display: none;
            }

            .now-playing-view .album-art {
                width: 240px;
                height: 240px;
            }

            .now-playing-view .song-title {
                font-size: 22px;
            }

            .now-playing-view .controls {
                gap: 24px;
            }

            .now-playing-view .controls i {
                font-size: 18px;
            }

            .now-playing-view .controls #play-btn-full {
                font-size: 36px;
                width: 64px;
                height: 64px;
                padding: 12px;
            }

            .now-playing .song-actions {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .now-playing .controls-top {
                gap: 14px;
                font-size: 14px;
            }

            .now-playing .controls-top #play-btn {
                font-size: 24px;
            }

            .now-playing .volume-controls {
                display: none;
            }

            .now-playing .song-info {
                min-width: unset;
            }
        }
    </style>
</head>
<body>
    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-music"></i>
            <span>Mi Música</span>
        </div>
        <nav>
            <ul>
                <li class="active" data-view="all">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </li>
                <li data-view="favorites">
                    <i class="fa-solid fa-heart"></i>
                    <span>Favoritos</span>
                    <span class="badge" id="favoritesCount">0</span>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content">
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <h1 id="viewTitle">Biblioteca</h1>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-search"></i>
                <i class="fa-solid fa-user-circle"></i>
            </div>
        </header>

        <!-- ========== VIEW: TODAS LAS CANCIONES ========== -->
        <div class="view active" id="viewAll">
            <section class="song-grid" id="allSongsGrid">
                <!-- Las canciones se generan con JavaScript -->
            </section>
        </div>

        <!-- ========== VIEW: FAVORITOS ========== -->
        <div class="view" id="viewFavorites">
            <section class="song-grid" id="favoritesGrid">
                <!-- Las canciones favoritas se generan con JavaScript -->
            </section>
            <div class="empty-state" id="emptyFavorites">
                <i class="fa-regular fa-heart"></i>
                <h2>Sin canciones favoritas</h2>
                <p>Marca tus canciones como favoritas para verlas aquí</p>
            </div>
        </div>

        <!-- ========== NOW PLAYING VIEW (FULL SCREEN) ========== -->
        <div class="now-playing-view" id="nowPlayingView">
            <i class="fa-solid fa-xmark close-btn" id="closeNowPlaying"></i>
            
            <div class="album-art" id="albumArt">
                <i class="fa-solid fa-music default-icon"></i>
            </div>
            
            <div class="song-title" id="fullSongTitle">Ninguna canción</div>
            <div class="song-artist" id="fullSongArtist">Selecciona una canción</div>
            
            <div class="controls">
                <i class="fa-solid fa-shuffle" id="full-shuffle" title="Aleatorio"></i>
                <i class="fa-solid fa-backward-step" id="prev-btn-full"></i>
                <i class="fa-solid fa-play" id="play-btn-full"></i>
                <i class="fa-solid fa-forward-step" id="next-btn-full"></i>
                <i class="fa-solid fa-repeat" id="full-repeat" title="Repetir"></i>
            </div>
            
            <div class="progress-container">
                <span class="current-time" id="full-current-time">0:00</span>
                <input
                    type="range"
                    class="progress-bar"
                    id="full-progress-bar"
                    min="0"
                    max="100"
                    value="0"
                />
                <span class="total-time" id="full-total-time">0:00</span>
            </div>
            
            <div class="extra-controls">
                <i class="fa-regular fa-heart" id="full-like-btn"></i>
                <i class="fa-regular fa-clock" title="Añadir a lista"></i>
                <i class="fa-regular fa-share-from-square" title="Compartir"></i>
                <i class="fa-solid fa-volume-high" id="full-volume-icon"></i>
            </div>
        </div>

        <!-- ========== NOW PLAYING BAR ========== -->
        <footer class="now-playing" id="nowPlayingBar">
            <div class="song-info">
                <div class="song-thumbnail" id="barThumbnail">
                    <i class="fa-solid fa-music"></i>
                </div>
                <div class="song-details">
                    <h4 id="now-playing-title">Ninguna canción</h4>
                    <p id="now-playing-artist">Selecciona una canción</p>
                </div>
                <div class="song-actions">
                    <i class="fa-regular fa-heart" id="bar-like-btn"></i>
                    <i class="fa-regular fa-clock" title="Añadir a lista"></i>
                </div>
            </div>

            <div class="player-controls">
                <div class="controls-top">
                    <i class="fa-solid fa-shuffle" id="shuffle-btn" title="Aleatorio"></i>
                    <i class="fa-solid fa-backward-step" id="prev-btn"></i>
                    <i class="fa-solid fa-play" id="play-btn"></i>
                    <i class="fa-solid fa-forward-step" id="next-btn"></i>
                    <i class="fa-solid fa-repeat" id="repeat-btn" title="Repetir"></i>
                </div>
                <div class="progress-container">
                    <span class="current-time" id="current-time">0:00</span>
                    <input
                        type="range"
                        class="progress-bar"
                        id="progress-bar"
                        min="0"
                        max="100"
                        value="0"
                    />
                    <span class="total-time" id="total-time">0:00</span>
                </div>
            </div>

            <div class="volume-controls">
                <i class="fa-solid fa-volume-high" id="volume-icon"></i>
                <input
                    type="range"
                    class="volume-bar"
                    id="volume-bar"
                    min="0"
                    max="100"
                    value="70"
                />
            </div>
        </footer>
    </main>

    <audio id="audio-player"></audio>

    <!-- ========== JAVASCRIPT ========== -->
    <script>
        // =============================================
        // LISTA DE CANCIONES
        // =============================================
        const songs = [
            {
                id: 0,
                title: 'Duele un Montón Despedirme De Ti',
                artist: 'Aitana',
                src: 'canciones/Duele un Montón Despedirme De Ti - Aitana.mp3',
                cover: 'https://picsum.photos/seed/aitana/400/400',
                favorite: false
            },
            {
                id: 1,
                title: 'Mango y Ron',
                artist: 'Desconocido',
                src: 'canciones/Mango y Ron.mp3',
                cover: 'https://picsum.photos/seed/mango/400/400',
                favorite: false
            },
        ];

        // =============================================
        // ELEMENTOS DEL DOM
        // =============================================
        const audio = document.getElementById('audio-player');
        
        // Barra inferior
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const volumeBar = document.getElementById('volume-bar');
        const volumeIcon = document.getElementById('volume-icon');
        const nowPlayingTitle = document.getElementById('now-playing-title');
        const nowPlayingArtist = document.getElementById('now-playing-artist');
        const barThumbnail = document.getElementById('barThumbnail');
        const barLikeBtn = document.getElementById('bar-like-btn');
        const nowPlayingBar = document.getElementById('nowPlayingBar');
        
        // Vista completa
        const nowPlayingView = document.getElementById('nowPlayingView');
        const closeNowPlaying = document.getElementById('closeNowPlaying');
        const albumArt = document.getElementById('albumArt');
        const fullSongTitle = document.getElementById('fullSongTitle');
        const fullSongArtist = document.getElementById('fullSongArtist');
        const playBtnFull = document.getElementById('play-btn-full');
        const prevBtnFull = document.getElementById('prev-btn-full');
        const nextBtnFull = document.getElementById('next-btn-full');
        const fullProgressBar = document.getElementById('full-progress-bar');
        const fullCurrentTime = document.getElementById('full-current-time');
        const fullTotalTime = document.getElementById('full-total-time');
        const fullLikeBtn = document.getElementById('full-like-btn');
        const fullShuffle = document.getElementById('full-shuffle');
        const fullRepeat = document.getElementById('full-repeat');
        
        // Views
        const viewAll = document.getElementById('viewAll');
        const viewFavorites = document.getElementById('viewFavorites');
        const allSongsGrid = document.getElementById('allSongsGrid');
        const favoritesGrid = document.getElementById('favoritesGrid');
        const emptyFavorites = document.getElementById('emptyFavorites');
        const favoritesCount = document.getElementById('favoritesCount');
        const viewTitle = document.getElementById('viewTitle');
        const navItems = document.querySelectorAll('.sidebar nav ul li');

        // =============================================
        // ESTADO
        // =============================================
        let currentSongIndex = 0;
        let isPlaying = false;
        let currentView = 'all';
        let isShuffled = false;
        let isRepeating = false;
        let volume = 70;

        // =============================================
        // FUNCIONES
        // =============================================

        // Renderizar canciones
        function renderSongs() {
            allSongsGrid.innerHTML = songs.map((song, index) => `
                <div class="song-card" data-song="${index}">
                    <div class="favorite-badge ${song.favorite ? 'show' : ''}">
                        <i class="fa-solid fa-heart"></i> Favorita
                    </div>
                    <div class="song-card-img" style="background-image: url('${song.cover}');">
                        <i class="fa-solid fa-music default-icon"></i>
                        <div class="play-overlay">
                            <i class="fa-solid fa-play"></i>
                        </div>
                    </div>
                    <div class="song-card-info">
                        <h3>${song.title}</h3>
                        <p>${song.artist}</p>
                    </div>
                </div>
            `).join('');

            const favorites = songs.filter(s => s.favorite);
            if (favorites.length === 0) {
                favoritesGrid.innerHTML = '';
                emptyFavorites.style.display = 'block';
            } else {
                emptyFavorites.style.display = 'none';
                favoritesGrid.innerHTML = favorites.map((song) => {
                    const originalIndex = songs.indexOf(song);
                    return `
                        <div class="song-card" data-song="${originalIndex}">
                            <div class="favorite-badge show">
                                <i class="fa-solid fa-heart"></i> Favorita
                            </div>
                            <div class="song-card-img" style="background-image: url('${song.cover}');">
                                <i class="fa-solid fa-music default-icon"></i>
                                <div class="play-overlay">
                                    <i class="fa-solid fa-play"></i>
                                </div>
                            </div>
                            <div class="song-card-info">
                                <h3>${song.title}</h3>
                                <p>${song.artist}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            favoritesCount.textContent = songs.filter(s => s.favorite).length;

            document.querySelectorAll('.song-card').forEach((card) => {
                const index = parseInt(card.dataset.song);
                card.addEventListener('click', () => {
                    if (currentSongIndex === index && isPlaying) {
                        togglePlay();
                    } else {
                        currentSongIndex = index;
                        loadSong(index);
                        audio.play().catch(error => {
                            console.error('Error al reproducir:', error);
                            alert('No se pudo reproducir el audio. Verifica que el archivo existe.');
                        });
                        playBtn.className = 'fa-solid fa-pause';
                        playBtnFull.className = 'fa-solid fa-pause';
                        isPlaying = true;
                    }
                });
            });

            updateActiveCard(currentSongIndex);
        }

        function loadSong(index) {
            const song = songs[index];
            audio.src = song.src;
            nowPlayingTitle.textContent = song.title;
            nowPlayingArtist.textContent = song.artist;
            fullSongTitle.textContent = song.title;
            fullSongArtist.textContent = song.artist;
            
            const isFav = song.favorite;
            barLikeBtn.className = `fa-${isFav ? 'solid' : 'regular'} fa-heart${isFav ? ' liked' : ''}`;
            fullLikeBtn.className = `fa-${isFav ? 'solid' : 'regular'} fa-heart${isFav ? ' liked' : ''}`;
            
            if (song.cover) {
                albumArt.style.backgroundImage = `url('${song.cover}')`;
                albumArt.innerHTML = '';
                barThumbnail.style.backgroundImage = `url('${song.cover}')`;
                barThumbnail.innerHTML = '';
            } else {
                albumArt.style.backgroundImage = 'none';
                albumArt.innerHTML = '<i class="fa-solid fa-music default-icon"></i>';
                barThumbnail.style.backgroundImage = 'none';
                barThumbnail.innerHTML = '<i class="fa-solid fa-music"></i>';
            }
            
            updateActiveCard(index);
            renderSongs();
        }

        function updateActiveCard(index) {
            document.querySelectorAll('.song-card').forEach((card) => {
                const songIndex = parseInt(card.dataset.song);
                card.style.border = songIndex === index ? '2px solid #ff2d55' : '2px solid transparent';
            });
        }

        function toggleFavorite() {
            const song = songs[currentSongIndex];
            song.favorite = !song.favorite;
            const isFav = song.favorite;
            
            barLikeBtn.className = `fa-${isFav ? 'solid' : 'regular'} fa-heart${isFav ? ' liked' : ''}`;
            fullLikeBtn.className = `fa-${isFav ? 'solid' : 'regular'} fa-heart${isFav ? ' liked' : ''}`;
            
            renderSongs();
            if (currentView === 'favorites') {
                renderFavoritesView();
            }
        }

        function renderFavoritesView() {
            const favorites = songs.filter(s => s.favorite);
            if (favorites.length === 0) {
                favoritesGrid.innerHTML = '';
                emptyFavorites.style.display = 'block';
            } else {
                emptyFavorites.style.display = 'none';
                favoritesGrid.innerHTML = favorites.map((song) => {
                    const originalIndex = songs.indexOf(song);
                    return `
                        <div class="song-card" data-song="${originalIndex}">
                            <div class="favorite-badge show">
                                <i class="fa-solid fa-heart"></i> Favorita
                            </div>
                            <div class="song-card-img" style="background-image: url('${song.cover}');">
                                <i class="fa-solid fa-music default-icon"></i>
                                <div class="play-overlay">
                                    <i class="fa-solid fa-play"></i>
                                </div>
                            </div>
                            <div class="song-card-info">
                                <h3>${song.title}</h3>
                                <p>${song.artist}</p>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            document.querySelectorAll('#favoritesGrid .song-card').forEach((card) => {
                const index = parseInt(card.dataset.song);
                card.addEventListener('click', () => {
                    if (currentSongIndex === index && isPlaying) {
                        togglePlay();
                    } else {
                        currentSongIndex = index;
                        loadSong(index);
                        audio.play().catch(error => {
                            console.error('Error al reproducir:', error);
                            alert('No se pudo reproducir el audio. Verifica que el archivo existe.');
                        });
                        playBtn.className = 'fa-solid fa-pause';
                        playBtnFull.className = 'fa-solid fa-pause';
                        isPlaying = true;
                    }
                });
            });
        }

        function switchView(view) {
            currentView = view;
            
            navItems.forEach(item => {
                item.classList.toggle('active', item.dataset.view === view);
            });
            
            viewTitle.textContent = view === 'all' ? 'Biblioteca' : 'Favoritos';
            
            viewAll.classList.toggle('active', view === 'all');
            viewFavorites.classList.toggle('active', view === 'favorites');
            
            if (view === 'favorites') {
                renderFavoritesView();
            }
        }

        function toggleShuffle() {
            isShuffled = !isShuffled;
            shuffleBtn.classList.toggle('active');
            fullShuffle.classList.toggle('active');
        }

        function toggleRepeat() {
            isRepeating = !isRepeating;
            repeatBtn.classList.toggle('active');
            fullRepeat.classList.toggle('active');
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.className = 'fa-solid fa-play';
                playBtnFull.className = 'fa-solid fa-play';
            } else {
                audio.play().catch(error => {
                    console.error('Error al reproducir:', error);
                    alert('No se pudo reproducir el audio. Verifica que el archivo existe.');
                });
                playBtn.className = 'fa-solid fa-pause';
                playBtnFull.className = 'fa-solid fa-pause';
            }
            isPlaying = !isPlaying;
        }

        function prevSong() {
            if (isShuffled) {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * songs.length);
                } while (newIndex === currentSongIndex && songs.length > 1);
                currentSongIndex = newIndex;
            } else {
                currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            }
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play();
            }
        }

        function nextSong() {
            if (isShuffled) {
                let newIndex;
                do {
                    newIndex = Math.floor(Math.random() * songs.length);
                } while (newIndex === currentSongIndex && songs.length > 1);
                currentSongIndex = newIndex;
            } else {
                currentSongIndex = (currentSongIndex + 1) % songs.length;
            }
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play();
            }
        }

        function updateProgress() {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progress;
                fullProgressBar.value = progress;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                totalTimeEl.textContent = formatTime(audio.duration);
                fullCurrentTime.textContent = formatTime(audio.currentTime);
                fullTotalTime.textContent = formatTime(audio.duration);
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function setProgress(e) {
            const value = e.target.value;
            const time = (value / 100) * audio.duration;
            audio.currentTime = time;
        }

        function setVolume(e) {
            volume = e.target.value;
            audio.volume = volume / 100;
            updateVolumeIcon();
        }

        function updateVolumeIcon() {
            const vol = parseInt(volume);
            if (vol === 0) {
                volumeIcon.className = 'fa-solid fa-volume-xmark';
                document.getElementById('full-volume-icon').className = 'fa-solid fa-volume-xmark';
            } else if (vol < 50) {
                volumeIcon.className = 'fa-solid fa-volume-low';
                document.getElementById('full-volume-icon').className = 'fa-solid fa-volume-low';
            } else {
                volumeIcon.className = 'fa-solid fa-volume-high';
                document.getElementById('full-volume-icon').className = 'fa-solid fa-volume-high';
            }
        }

        function openFullView() {
            nowPlayingView.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeFullView() {
            nowPlayingView.classList.remove('active');
            document.body.style.overflow = '';
        }

        // =============================================
        // EVENT LISTENERS
        // =============================================

        // Navegación
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                switchView(item.dataset.view);
            });
        });

        // Controles de la barra inferior - TODOS FUNCIONAN
        playBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });
        
        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            prevSong();
        });
        
        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            nextSong();
        });
        
        shuffleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleShuffle();
        });
        
        repeatBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleRepeat();
        });

        // Controles de la vista completa - TODOS FUNCIONAN
        playBtnFull.addEventListener('click', (e) => {
            e.stopPropagation();
            togglePlay();
        });
        
        prevBtnFull.addEventListener('click', (e) => {
            e.stopPropagation();
            prevSong();
        });
        
        nextBtnFull.addEventListener('click', (e) => {
            e.stopPropagation();
            nextSong();
        });
        
        fullShuffle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleShuffle();
        });
        
        fullRepeat.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleRepeat();
        });

        // Barra de progreso
        progressBar.addEventListener('input', setProgress);
        fullProgressBar.addEventListener('input', setProgress);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', () => {
            if (isRepeating) {
                audio.currentTime = 0;
                audio.play();
            } else {
                nextSong();
            }
        });

        // Volumen
        volumeBar.addEventListener('input', setVolume);

        // Abrir vista completa - SOLO cuando se hace clic en la barra, no en los botones
        nowPlayingBar.addEventListener('click', (e) => {
            // Si el clic fue en un botón o control, no abrir la vista completa
            if (e.target.closest('.controls-top') || e.target.closest('.progress-container') || 
                e.target.closest('.volume-controls') || e.target.closest('.song-actions')) {
                return;
            }
            openFullView();
        });

        // Cerrar vista completa
        closeNowPlaying.addEventListener('click', closeFullView);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && nowPlayingView.classList.contains('active')) {
                closeFullView();
            }
        });

        // Botones "Me gusta"
        barLikeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavorite();
        });
        
        fullLikeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleFavorite();
        });

        // =============================================
        // INICIALIZAR
        // =============================================
        renderSongs();
        loadSong(0);
        updateVolumeIcon();

        // =============================================
        // TECLAS RÁPIDAS
        // =============================================
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextSong();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevSong();
            }
        });
    </script>
</body>
</html>
