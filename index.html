<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Música - Apple Music Style</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
        /* ========== RESET Y BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ========== SIDEBAR ========== */
        .sidebar {
            width: 240px;
            background: #121212;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            border-right: 1px solid #1e1e1e;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            color: #ff2d55;
        }

        .logo i {
            font-size: 28px;
        }

        .logo span {
            color: #ffffff;
        }

        .sidebar nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar nav ul li {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #b3b3b3;
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar nav ul li:hover {
            color: #ffffff;
            background: #1e1e1e;
        }

        .sidebar nav ul li.active {
            color: #ffffff;
            background: #1e1e1e;
        }

        .sidebar nav ul li i {
            width: 20px;
            text-align: center;
        }

        /* ========== MAIN CONTENT ========== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f0f0f;
            overflow-y: auto;
            padding-bottom: 90px;
        }

        /* ========== HEADER ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 32px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .header-right {
            display: flex;
            gap: 20px;
            font-size: 20px;
            color: #b3b3b3;
            cursor: pointer;
        }

        .header-right i:hover {
            color: #ffffff;
        }

        /* ========== SONG GRID ========== */
        .song-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 24px;
            padding: 24px 32px;
        }

        .song-card {
            background: #181818;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.3s;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .song-card:hover {
            background: #282828;
            transform: translateY(-4px);
        }

        .song-card-img {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #b3b3b3;
            position: relative;
            margin-bottom: 12px;
        }

        .song-card-img i {
            opacity: 0.5;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .song-card:hover .play-overlay {
            opacity: 1;
        }

        .play-overlay i {
            font-size: 40px;
            color: #ffffff;
            opacity: 1;
            background: #ff2d55;
            border-radius: 50%;
            padding: 12px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(255, 45, 85, 0.4);
        }

        .song-card-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-card-info p {
            font-size: 14px;
            color: #b3b3b3;
        }

        /* ========== NOW PLAYING BAR ========== */
        .now-playing {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #181818;
            border-top: 1px solid #282828;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            z-index: 100;
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 14px;
            min-width: 200px;
        }

        .song-thumbnail {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #b3b3b3;
        }

        .song-details h4 {
            font-size: 14px;
            font-weight: 500;
        }

        .song-details p {
            font-size: 12px;
            color: #b3b3b3;
        }

        .like-btn {
            color: #b3b3b3;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .like-btn:hover {
            color: #ff2d55;
        }

        .like-btn.liked {
            color: #ff2d55;
        }

        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1;
            max-width: 600px;
        }

        .controls-top {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 18px;
            color: #b3b3b3;
        }

        .controls-top i {
            cursor: pointer;
            transition: all 0.2s;
        }

        .controls-top i:hover {
            color: #ffffff;
            transform: scale(1.05);
        }

        #play-btn {
            font-size: 28px;
            color: #ffffff;
        }

        #play-btn:hover {
            transform: scale(1.1);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .current-time,
        .total-time {
            font-size: 12px;
            color: #b3b3b3;
            min-width: 36px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #4a4a4a;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .progress-bar::-moz-range-thumb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
        }

        .volume-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 150px;
            justify-content: flex-end;
        }

        .volume-controls i {
            color: #b3b3b3;
            font-size: 16px;
        }

        .volume-bar {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #4a4a4a;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .volume-bar::-moz-range-thumb {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            border: none;
        }

        /* ========== SCROLLBAR ========== */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f0f0f;
        }

        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .song-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                padding: 16px;
                gap: 16px;
            }

            .header {
                padding: 16px;
            }

            .header-left h1 {
                font-size: 20px;
            }

            .now-playing {
                flex-direction: column;
                height: auto;
                padding: 12px 16px;
                gap: 8px;
            }

            .song-info {
                min-width: unset;
                width: 100%;
            }

            .player-controls {
                width: 100%;
                max-width: 100%;
            }

            .volume-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- ========== SIDEBAR ========== -->
    <aside class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-music"></i>
            <span>Mi Música</span>
        </div>
        <nav>
            <ul>
                <li class="active">
                    <i class="fa-solid fa-house"></i>
                    <span>Inicio</span>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- ========== MAIN CONTENT ========== -->
    <main class="main-content">
        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <h1>Biblioteca</h1>
            </div>
            <div class="header-right">
                <i class="fa-solid fa-search"></i>
                <i class="fa-solid fa-user-circle"></i>
            </div>
        </header>

        <!-- SONG GRID -->
        <section class="song-grid">
            <div class="song-card" data-song="0">
                <div class="song-card-img">
                    <i class="fa-solid fa-music"></i>
                    <div class="play-overlay">
                        <i class="fa-solid fa-play"></i>
                    </div>
                </div>
                <div class="song-card-info">
                    <h3>Duele un Montón Despedirme De Ti</h3>
                    <p>Aitana</p>
                </div>
            </div>

            <div class="song-card" data-song="1">
                <div class="song-card-img">
                    <i class="fa-solid fa-music"></i>
                    <div class="play-overlay">
                        <i class="fa-solid fa-play"></i>
                    </div>
                </div>
                <div class="song-card-info">
                    <h3>Mango y Ron</h3>
                    <p>Desconocido</p>
                </div>
            </div>
        </section>

        <!-- NOW PLAYING BAR -->
        <footer class="now-playing">
            <div class="song-info">
                <div class="song-thumbnail">
                    <i class="fa-solid fa-music"></i>
                </div>
                <div class="song-details">
                    <h4 id="now-playing-title">Ninguna canción</h4>
                    <p id="now-playing-artist">Selecciona una canción</p>
                </div>
                <i class="fa-regular fa-heart like-btn"></i>
            </div>

            <div class="player-controls">
                <div class="controls-top">
                    <i class="fa-solid fa-shuffle"></i>
                    <i class="fa-solid fa-backward-step" id="prev-btn"></i>
                    <i class="fa-solid fa-play" id="play-btn"></i>
                    <i class="fa-solid fa-forward-step" id="next-btn"></i>
                    <i class="fa-solid fa-repeat"></i>
                </div>
                <div class="progress-container">
                    <span class="current-time" id="current-time">0:00</span>
                    <input
                        type="range"
                        class="progress-bar"
                        id="progress-bar"
                        min="0"
                        max="100"
                        value="0"
                    />
                    <span class="total-time" id="total-time">0:00</span>
                </div>
            </div>

            <div class="volume-controls">
                <i class="fa-solid fa-volume-high"></i>
                <input
                    type="range"
                    class="volume-bar"
                    id="volume-bar"
                    min="0"
                    max="100"
                    value="70"
                />
            </div>
        </footer>
    </main>

    <audio id="audio-player"></audio>

    <!-- ========== JAVASCRIPT ========== -->
    <script>
        // =============================================
        // LISTA DE CANCIONES (ARCHIVOS DESCARGADOS EN LA CARPETA 'canciones')
        // =============================================
        const songs = [
            {
                title: 'Duele un Montón Despedirme De Ti',
                artist: 'Aitana',
                src: 'canciones/Duele un Montón Despedirme De Ti - Aitana.mp3',
            },
            {
                title: 'Mango y Ron',
                artist: 'Desconocido',
                src: 'canciones/Mango y Ron.mp3',
            },
        ];

        // =============================================
        // ELEMENTOS DEL DOM
        // =============================================
        const audio = document.getElementById('audio-player');
        const playBtn = document.getElementById('play-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const currentTimeEl = document.getElementById('current-time');
        const totalTimeEl = document.getElementById('total-time');
        const volumeBar = document.getElementById('volume-bar');
        const nowPlayingTitle = document.getElementById('now-playing-title');
        const nowPlayingArtist = document.getElementById('now-playing-artist');
        const songCards = document.querySelectorAll('.song-card');
        const likeBtn = document.querySelector('.like-btn');

        // =============================================
        // ESTADO
        // =============================================
        let currentSongIndex = 0;
        let isPlaying = false;
        let isLiked = false;

        // =============================================
        // FUNCIONES
        // =============================================

        // Cargar canción
        function loadSong(index) {
            const song = songs[index];
            audio.src = song.src;
            nowPlayingTitle.textContent = song.title;
            nowPlayingArtist.textContent = song.artist;
            updateActiveCard(index);
        }

        // Actualizar tarjeta activa
        function updateActiveCard(index) {
            songCards.forEach((card, i) => {
                card.style.border = i === index ? '2px solid #ff2d55' : '2px solid transparent';
            });
        }

        // Reproducir / Pausar
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.className = 'fa-solid fa-play';
            } else {
                audio.play().catch(error => {
                    console.error('Error al reproducir:', error);
                    alert('No se pudo reproducir el audio. Verifica que el archivo existe.');
                });
                playBtn.className = 'fa-solid fa-pause';
            }
            isPlaying = !isPlaying;
        }

        // Canción anterior
        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play();
            }
        }

        // Canción siguiente
        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            loadSong(currentSongIndex);
            if (isPlaying) {
                audio.play();
            }
        }

        // Actualizar barra de progreso
        function updateProgress() {
            if (audio.duration) {
                const progress = (audio.currentTime / audio.duration) * 100;
                progressBar.value = progress;
                currentTimeEl.textContent = formatTime(audio.currentTime);
                totalTimeEl.textContent = formatTime(audio.duration);
            }
        }

        // Formatear tiempo (segundos -> MM:SS)
        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        // Establecer progreso manualmente
        function setProgress(e) {
            const value = e.target.value;
            const time = (value / 100) * audio.duration;
            audio.currentTime = time;
        }

        // =============================================
        // EVENT LISTENERS
        // =============================================

        // Controles de reproducción
        playBtn.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);

        // Barra de progreso
        progressBar.addEventListener('input', setProgress);
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('ended', nextSong);

        // Volumen
        volumeBar.addEventListener('input', (e) => {
            audio.volume = e.target.value / 100;
        });

        // Clic en tarjetas de canciones
        songCards.forEach((card, index) => {
            card.addEventListener('click', () => {
                if (currentSongIndex === index && isPlaying) {
                    togglePlay();
                } else {
                    currentSongIndex = index;
                    loadSong(index);
                    audio.play().catch(error => {
                        console.error('Error al reproducir:', error);
                        alert('No se pudo reproducir el audio. Verifica que el archivo existe.');
                    });
                    playBtn.className = 'fa-solid fa-pause';
                    isPlaying = true;
                }
            });
        });

        // Botón "Me gusta"
        likeBtn.addEventListener('click', () => {
            isLiked = !isLiked;
            likeBtn.classList.toggle('liked');
        });

        // =============================================
        // INICIALIZAR
        // =============================================
        loadSong(0);

        // =============================================
        // TECLAS RÁPIDAS
        // =============================================
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'ArrowRight') {
                e.preventDefault();
                nextSong();
            }
            if (e.code === 'ArrowLeft') {
                e.preventDefault();
                prevSong();
            }
        });
    </script>
</body>
</html>
